#
# Two-side pin layout for the AttoIO macro.
#
#   N (top)    -- pad_* signals.  When AttoIO is placed inside
#                 project_macro this face abuts the chip's top edge
#                 (where the 14 GPIO pads on gpio_top[13:0] live).
#                 attoio_pad[15:14] are still pinned here even though
#                 project_macro ties them off internally.
#
#   S (bottom) -- APB bus, clocks, reset, and the irq_to_host status.
#                 This face faces the apb_splitter and the chip-level
#                 IRQ aggregator (apb_status @ 0x2010).
#
#   E / W      -- hp0/hp1/hp2 host-peripheral bundles, unused in
#                 project_macro.  Placed here only because the
#                 attoio_macro module ports still exist; left to
#                 the router for ordering within each side.

#N
^pad_in\[.*\]$
^pad_out\[.*\]$
^pad_oe\[.*\]$
^pad_ctl\[.*\]$

#S
^sysclk$
^clk_iop$
^rst_n$
^PADDR\[.*\]$
^PSEL$
^PENABLE$
^PWRITE$
^PWDATA\[.*\]$
^PSTRB\[.*\]$
^PRDATA\[.*\]$
^PREADY$
^PSLVERR$
^irq_to_host$

#E
^hp0_in\[.*\]$
^hp0_out\[.*\]$
^hp0_oe\[.*\]$

#W
^hp1_in\[.*\]$
^hp1_out\[.*\]$
^hp1_oe\[.*\]$
^hp2_in\[.*\]$
^hp2_out\[.*\]$
^hp2_oe\[.*\]$
