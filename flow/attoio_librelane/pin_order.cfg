#
# Two-side pin layout for the attoio_wrap macro (slim interface).
#
#   N (top)    -- pad_* signals (84 pins total: pad_in/out/oe x 14,
#                 plus pad_dm[41:0] = 3-bit drive mode per pad). When
#                 attoio_wrap is placed inside project_macro this face
#                 abuts the chip's top edge (gpio_top[13:0]).
#
#   S (bottom) -- APB bus, clocks, reset, and irq_to_host (~88 pins).
#                 Faces the apb_splitter and apb_status (IRQ aggregator).
#
# E and W are intentionally empty. The unused hp_* bundles, the
# un-pinned pad[15:14] paths, and the upper 5 bits of each AttoIO
# pad_ctl word are all tied off / dropped inside the wrapper, so they
# never appear as macro ports.
#
# Per-pad bundle order keeps each pad's signals contiguous on the N
# face (matches the pad-grouping pattern used on project_macro's top
# edge so abutment is one-to-one):
#   pad_in[i] / pad_out[i] / pad_oe[i] / pad_dm[3i] / pad_dm[3i+1] / pad_dm[3i+2]

