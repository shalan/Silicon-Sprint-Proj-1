#
# Two-side pin layout for the attoio_wrap macro.
#
#   N (top)    -- pad_* signals (176 pins). When attoio_wrap is placed
#                 inside project_macro this face abuts the chip's top
#                 edge (where gpio_top[13:0] sit). attoio_pad[15:14]
#                 still appear here even though project_macro ties
#                 them off internally (NGPIO=16 is required by the
#                 inner attoio_macro).
#
#   S (bottom) -- APB bus, clocks, reset, and the irq_to_host status
#                 (~88 pins). Faces the apb_splitter and the chip-level
#                 IRQ aggregator (apb_status @ 0x2010).
#
# No pins on E or W. The unused hp_* bundles are tied off inside the
# wrapper so they do not appear as macro ports.

#N
^pad_in\[.*\]$
^pad_out\[.*\]$
^pad_oe\[.*\]$
^pad_ctl\[.*\]$

#S
^sysclk$
^clk_iop$
^rst_n$
^PADDR\[.*\]$
^PSEL$
^PENABLE$
^PWRITE$
^PWDATA\[.*\]$
^PSTRB\[.*\]$
^PRDATA\[.*\]$
^PREADY$
^PSLVERR$
^irq_to_host$
