name: sim

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  iverilog-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install iverilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          iverilog -V | head -1

      - name: Lint
        run: make lint

      - name: Simulate (apb_regs)
        run: make sim TEST=apb_regs

      - name: Upload sim log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-log
          path: build/sim.*.log
